name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get code from GitHub
      - name: Checkout code
        uses: actions/checkout@v2

      # Step 2: Install dependencies (for test step if needed)
      - name: Install dependencies
        run: npm install

      # Step 3: (Optional) Run tests
      # - name: Run tests
      #   run: npm test

      # Step 4: Deploy to EC2 via SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_DNS }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/my-app
            git pull origin main
            npm install
            pm2 restart all